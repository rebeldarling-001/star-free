<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FFXIPL Leaderboard</title>

<link rel="stylesheet" href="leaderboard.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="title">🏆 FFXIPL LEADERBOARD</div>
    <div class="sub">▶ LIVE TOURNAMENT RANKINGS ◀</div>
  </div>

  <!-- ADMIN -->
  <div class="card admin">

    <div class="admin-title">🛡 ADMIN ACCESS</div>

    <div class="admin-box">
      <input type="password" id="pass" placeholder="Enter Admin Password">
      <button onclick="login()">LOGIN</button>
    </div>

    <div class="status">
      Status: <span id="status">🔒 Locked</span>
    </div>

  </div>

  <!-- TABLE -->
  <div class="card table">

    <div class="row head">
      <div>R</div>
      <div>TEAM</div>
      <div>M</div>
      <div>W</div>
      <div>L</div>
      <div>PTS</div>
      <div>🔒</div>
    </div>

    <div id="rows"></div>

  </div>

  <!-- FOOTER -->
 <div class="footer">
  <span>FFXIPL • FEEL THE FIGHT. LIVE THE GLORY.</span>
  <span class="dot"></span>
  <span>Real-time Updates</span>
</div>

</div>

<script src="leaderboard.js"></script>
</body>
</html>
