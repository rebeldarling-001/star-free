<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FREEFIREXIPL • Teams</title>

<link rel="stylesheet" href="teams1.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">

</head>

<body>

<!-- Background -->

<div class="bg-circle bg1"></div>

<div class="bg-circle bg2"></div>

<!-- Header -->

<header>

<div class="back">

<i class="fa-solid fa-arrow-left"></i>

</div>

<div class="heading">

<h2>TEAM FRANCHISES</h2>

<p>FREEFIREXIPL • Season 11</p>

</div>

<div class="menu">

<i class="fa-solid fa-bars"></i>

</div>

</header>

<!-- Hero -->

<section class="hero">

<div class="hero-glow"></div>

<div class="hero-content">

<span class="badge">
<i class="fa-solid fa-crown"></i>
SEASON 11
</span>

<h1>TEAM FRANCHISES</h1>

<p>
Choose your franchise and explore every team's legacy.
</p>

<div class="hero-stats">

<div class="hero-box">

<h2>8</h2>

<span>Teams</span>

</div>

<div class="hero-box">

<h2>48</h2>

<span>Players</span>

</div>

<div class="hero-box">

<h2>11</h2>

<span>Season</span>

</div>

</div>

</div>

</section>

<!-- Logo Slider -->

<section class="carousel">

<div class="carousel-track">

<div class="team-logo active" data-team="0">
<img src="SRHLOGO.png">
</div>

<div class="team-logo" data-team="1">
<img src="RCBLOGO.png">
</div>

<div class="team-logo" data-team="2">
<img src="KKRLOGO.png">
</div>

<div class="team-logo" data-team="3">
<img src="MILOGO.png">
</div>

<div class="team-logo" data-team="4">
<img src="DCLOGO.png">
</div>

<div class="team-logo" data-team="5">
<img src="PBKSLOGO.png">
</div>

<div class="team-logo" data-team="6">
<img src="RRLOGO.png">
</div>

<div class="team-logo" data-team="7">
<img src="CSKLOGO.png">
</div>

</div>

</section>
<!-- Premium Team Card -->

<section class="team-card">
<div class="team-watermark">

<img id="watermarkLogo"
src="images/srh.png">

</div>
<div class="team-top">

<img id="teamLogo"

src="images/srh.png">

<h2 id="teamName">

SUNRISERS HYDERABAD

</h2>

<p id="teamShort">

SRH

</p>

</div>

<div class="team-info">

<div class="info">

<span>OWNER</span>

<h3 id="owner">

Raviteja

</h3>

</div>

<div class="info">

<span>PRICE</span>

<h3 id="price">

₹18,500

</h3>

</div>

<div class="info">

<span>TROPHIES</span>

<h3 id="titles">

🏆🏆🏆

</h3>

</div>

<div class="info">

<span>PLAYERS</span>

<h3 id="players">

6

</h3>

</div>

</div>

<button class="viewBtn">


VIEW TEAM



<i class="fa-solid fa-arrow-right"></i>

</button>

</section>

<script src="teams1.js"></script>

</body>

</html>
